# Minimal SPA server for the built frontend inside the container.
#
# This only serves static assets with client-side-routing fallback. It does NOT
# terminate TLS, enforce auth, or proxy /api — those remain the outer reverse
# proxy's job (see docs/DEPLOYMENT.md → Reverse-proxy requirements). Put this
# container behind that proxy; do not expose it directly.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Client-side routes: always fall back to the SPA entrypoint.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
