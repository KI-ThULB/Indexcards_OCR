name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # shared-types must be generated before the frontend typechecks/builds.
      - name: Generate shared types
        run: npm run build --workspace @indexcards/shared-types

      - name: Lint
        run: npm run lint --workspace @indexcards/frontend

      - name: Typecheck
        run: npm run typecheck --workspace @indexcards/frontend

      - name: Build
        run: npm run build --workspace @indexcards/frontend

  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install    # honours apps/backend/.python-version (3.14)

      - name: Create venv and install dependencies
        run: |
          uv venv
          uv pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: uv run ruff check app/

      - name: Mypy (typecheck)
        run: uv run mypy app/

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short

  docker:
    name: Docker images (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build (do not push) both images to prove the Dockerfiles are valid.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: false
          load: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # The frontend image builds from the repo ROOT (workspace dep on
      # @indexcards/shared-types); keep this context in sync with the Dockerfile.
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
